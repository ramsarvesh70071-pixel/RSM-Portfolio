<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <form>
            <table align="center">
                <th colspan="2">Register Here</th>
                <tr>
                <tr>
                        <td>Your Name :</td>
                         <td><input type="text"/></td>
                </tr>
                 <tr>
                        <td>Last Name :</td>
                         <td><input type="text"/></td>
                </tr>
                <tr>
                    <td>Email :</td>
                    <td><input type="text"/></td>
                </tr>
                <tr>
                    <td> DOB :</td>
                    <td><input type="date"/></td>
                </tr>
                <tr>
                    <td>Gender :</td>
                    <td>
                        <input type="radio" name="gen"/>Male
                        <input type="radio" name="gen"/>Female
                    </td>
                </tr>
                  <tr>
                    <td>Gender :</td>
                    <td>
                        <input type="checkbox" name="q"/>BCA
                        <input type="checkbox" name="q"/>MCA
                        <input type="checkbox" name="q"/>Phd.
                    </td>
                </tr>
                <tr>
                    <td>Category :</td>
                    <td>
                        <select>
                            <option>Select</option>
                            <option>General</option>
                            <option>OBC</option>
                            <option>SC</option>
                            <option>ST</option>
                            <option>EWS</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Image Upload</td>
                    <td><input type="file"/></td>
                </tr>
                <tr>
                    <td>About You:</td>
                    <td>
                        <textarea cols="30" rows="5"></textarea>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><input type="submit" value="Sign In"/></td>
                </tr>
            </table>
        </form>
    </body>
</html>
