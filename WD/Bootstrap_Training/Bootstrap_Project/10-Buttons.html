<html>
    <head>
        <title>Buttons</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
            integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
            <style>
                *{
                    margin: 10px;
                }
            </style>

    </head>
    <body>
        <div class="container"></div>
        <!--OUTLINED BUTTON-->
        <button type="button" class="btn btn-outline-primary">Primary</button>
        <button type="button" class="btn btn-outline-success">Primary</button>
        <button type="button" class="btn btn-outline-info">Primary</button>
        <button type="button" class="btn btn-outline-warning">Primary</button>
        <button type="button" class="btn btn-outline-active">Primary</button>
        <button type="button" class="btn btn-outline-danger">Primary</button>
        <button type="button" class="btn btn-link">Primary</button>
        <br/><br/><br /><br />


        <!--BUTTON SIZE-->
        <button type="button" class="btn btn-outline-danger btn-block">Danger</button>


        
    </body>
</html>
