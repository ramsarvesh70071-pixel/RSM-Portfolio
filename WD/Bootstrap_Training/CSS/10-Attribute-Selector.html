<html>
    <head>
        <title>Attribute Selector</title>
        <style>
            [data-modal="closed"]{
                color: red;
            }
              [data-modal="open"]{
                color: red;
            }
        </style>
    </head>
    <body>
        <div class="c"> Div-1</div>
        <div data-modal="open"> Div-2</div>
        <div id="d"> Div-3</div>
        <div data-modal="closed"> Div-2</div>
    </body>
</html>
