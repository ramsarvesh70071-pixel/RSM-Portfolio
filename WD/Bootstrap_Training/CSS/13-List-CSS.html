<html>
    <head>
        <title>List CSS</title>
        <style>
            ol{
                list-style-type: lower-alpha;
                /* list-style-type: none; */
                border: 1px solid greenyellow;
                width: 200px;
                /* list-style-position: inside; */
                background-color: lightyellow;
            }
            li{
                border: 1px solid red;
                margin: 5px;
                padding: 5px;
                background-color: lightcyan;
            }
        </style>
    </head>
    <body>
        <ol>
            <li>India</li>
            <li>Nepal</li>
            <li>Bangladesh</li>
            <li>Sri Lanka</li>

        </ol>
    </body>
</html>
