<html>
    <head>
        <title>Attribute Selector</title>
        <style>
            p:first-child{
                color: red;
            }
            /* p:last-child{
                color: yellow;
            } */
            p:nth-child(even){
                color: blue;
            }
             p:nth-child(odd){
                color: red;
            }
        </style>
    </head>
    <body>
        <p>Paragraph-1</p>
        <p>Paragraph-2</p>
        <p>Paragraph-3</p>
        <p>Paragraph-4</p>
        <p>Paragraph-5</p>
        <p>Paragraph-6</p>
    </body>
</html>
