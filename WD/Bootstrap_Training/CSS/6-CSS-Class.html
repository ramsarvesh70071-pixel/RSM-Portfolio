<html>
    <head>
        <title>ID Selector</title>
        <!--Internal CSS-->
        <style>
            
            #p1{
                background-color: lightblue;
            }
             #p2{
                background-color: lightcoral;
                color: green;
            }
            #p3{
                background-color: lightgreen;
            }
            #p4{
                background-color: yellow;
            }
            .c{
                color: red;
            }

             
        </style>
    </head>
    <body>
        <p id="p1" class="c">Paragraph-1</p>
        <p id="p2">Paragraph-1</p>
        <p id="p3">Paragraph-1</p>
        <p id="p4" class="c">Paragraph-1</p>
    </body>
</html>
